version: "scoring-v0.7.0"

thresholds:
  observe: 5
  suspicious: 9
  high_risk: 14

limits:
  ml_score_cap: 5
  max_context_discount: -4
  danger_override_max_discount: -1

scores:
  # process category
  known_miner: 10
  persistent_miner: 3
  temp_exec: 1
  appdata_exec: 1
  # episode
  dos_spike: 5
  persistent_ext: 2
  # resource
  cpu_high: 1
  cpu_flat: 1
  mem_high: 1
  mem_critical: 1
  gpu_high: 1
  top_cpu_norm_high: 2
  top_cpu_norm_mid: 1
  # network
  net_out_sustained: 2
  outbound_spike: 2
  unique_remote_ip_high: 2
  unique_remote_ip_mid: 1
  new_remote_ip_burst: 1
  spike_with_companion: 1
  # correlation (v0.6 약화 — catalog 8.3 절)
  cpu_plus_net: 2          # 유지
  disk_write_net_out: 2    # 5 → 2 (FP 주범)
  unknown_proc_net: 2      # 5 → 2 (FP 주범)
  appdata_net: 2           # 6 → 2 (FP 주범)
  mining_known: 10         # 유지 (fast-path)
  mining_pool_only: 5      # 8 → 5

context_discounts:
  startup: -1
  security_scan: -2
  maintenance_update: -2
  lab_agent: -1
  class_or_free: -1

# === 신규 (v0.6): 카테고리 패턴 boolean evaluator =====================
# 각 entry 에 ``enabled: false`` 를 두면 비활성화. catalog 8.1 절의 보류
# 항목 (R6/R9/N1/N6/S2/S5) 은 enabled=false 로 둔다.
category_patterns:
  resource:
    R1_cpu_flat_sustained:
      threshold: { cpu_pct: 90, std: 5, window_min: 30 }
    R2_gpu_flat_sustained:
      threshold: { gpu_pct: 90, std: 5, window_min: 30 }
    R3_cpu_gpu_both_high:
      threshold: { cpu_pct: 90, gpu_pct: 90, window_min: 30 }
    R4_gpu_only_asymmetric:
      threshold: { gpu_pct: 90, cpu_pct_max: 15, window_min: 30 }
    R5_power_flatline:
      threshold: { power_std_w: 5, power_pct_of_tdp: 70, tdp_w: 250, window_min: 30 }
    R6_sm_no_tensor:
      enabled: false
      threshold: { sm_pct: 90, tensor_pct_max: 5, window_sec: 10 }
    R7_vram_low_compute_high:
      threshold: { vram_used_mb_max: 1024, gpu_pct: 90, window_min: 30 }
    R8_mem_idle_compute_high:
      threshold: { mem_used_gb_max: 4, gpu_pct: 90, window_min: 30 }
    R9_single_core_full:
      enabled: false
      threshold: { single_core_pct: 95, total_cpu_max: 40, window_min: 30 }
  network:
    N1_stratum_periodicity:
      enabled: false
      threshold: { packet_size_max: 600, period_sec: 30, window_min: 10 }
    N2_external_ip_persistent:
      threshold: { same_endpoint_minutes: 30 }
    N4_internal_zero_external_high:
      threshold: { internal_kb: 0, external_mb_min: 1, window_min: 30 }
    N5_outbound_low_cv:
      threshold: { cv_max: 0.3, window_min: 30 }
    N6_dns_burst_during_idle:
      enabled: false
      threshold: { new_domain_count: 20, user_idle_min: 30, window_min: 60 }
  system:
    S1_user_idle_high_load:
      threshold: { user_idle_min: 30, cpu_or_gpu_pct: 90, window_min: 30 }
    S2_locked_high_load:
      enabled: false
      threshold: { cpu_or_gpu_pct: 90, window_min: 30 }
    S3_high_load_disk_idle:
      threshold: { cpu_or_gpu_pct: 90, disk_mb_per_s_max: 1, window_min: 30 }
    S4_high_load_mem_idle:
      threshold: { cpu_or_gpu_pct: 90, mem_used_gb_max: 4, window_min: 30 }
    S5_process_recreation:
      enabled: false
      threshold: { recreation_count: 3, window_sec: 300 }

gating:
  mining_confirmed:
    categories_required: 3
    sustained_minutes: 180
    verdict: HIGH_RISK
  suspicious:
    categories_required: 2
    sustained_minutes: 30
    verdict: SUSPICIOUS
  observe:
    categories_required: 1
    sustained_minutes: 5
    verdict: OBSERVE

# === P0-3 (docs/fp_field_analysis_v0.6.md §7-P0-3) =====================
# 단일 신호 MEDIUM 진입 차단을 위한 promotion gating.
# Field 측정: MEDIUM 의 74% (948/1314) 가 alert 1개로 진입 → 신호 수 / 카테고리 수
# 동반 조건 추가. Fast-path 는 신호 수 무관하게 즉시 HIGH 유지.
promotion_gating:
  enabled: true
  medium:
    min_signal_count: 3
    min_category_count: 2
  high:
    min_signal_count: 4
    min_category_count: 2
  fast_path:
    # process_score >= 10 (mining_known 발화)
    - mining_known
    # category_gating 의 mining_confirmed (3 카테고리 + 3h sustained)
    - confirmed_sustained
    # alerts 에 CONFIRMED_MINING type 존재
    - alerts_contain_confirmed_mining
