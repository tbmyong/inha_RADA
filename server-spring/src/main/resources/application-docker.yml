# Local dev/test profile activated by SPRING_PROFILES_ACTIVE=docker
# (compose service hostnames are used as defaults; values can still be
# overridden by environment variables.)
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:pc_monitor}?currentSchema=${DB_SCHEMA:pc_monitor}

ml:
  server:
    base-url: ${ML_SERVER_URL:http://ml-server:8000}

# Local dev only — allow Flyway to repair() before migrate() so previously
# applied migrations (notably the original hard-coded V6) can be rewritten
# with placeholders without forcing a database volume reset. Production
# (default profile) leaves this `false` so checksum drift is investigated,
# not silently auto-healed.
rada:
  flyway:
    auto-repair: true
