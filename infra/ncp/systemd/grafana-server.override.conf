# /etc/systemd/system/grafana-server.service.d/override.conf
# 적용 방법:
#   sudo install -d /etc/systemd/system/grafana-server.service.d
#   sudo cp grafana-server.override.conf /etc/systemd/system/grafana-server.service.d/override.conf
#   sudo systemctl daemon-reload && sudo systemctl restart grafana-server
[Service]
# datasources/postgres.yaml 에서 ${GRAFANA_READER_PASSWORD} 치환에 사용된다.
Environment="GRAFANA_READER_PASSWORD=change_me_reader"
# 4GB RAM 환경에서 메모리 폭주 방지
MemoryHigh=350M
MemoryMax=512M
