##############################################################################
# RADA Grafana 설정 (Asia/Seoul 표시 / 익명 비허용)
##############################################################################

[server]
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
# 기본 admin 계정은 최초 부팅 후 즉시 변경
admin_user = admin
admin_password = changeme_on_first_boot
disable_gravatar = true
cookie_secure = false
cookie_samesite = lax

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer
default_theme = dark

[auth.anonymous]
# 익명 접근 비허용 (요구사항)
enabled = false

[auth.basic]
enabled = true

[analytics]
reporting_enabled = false
check_for_updates = false

[date_formats]
# UI 표기는 Asia/Seoul, 시스템 저장은 UTC
default_timezone = Asia/Seoul
default_week_start = monday
full_date = YYYY-MM-DD HH:mm:ss
interval_second = HH:mm:ss
interval_minute = HH:mm
interval_hour = MM-DD HH:mm
interval_day = YYYY-MM-DD
interval_month = YYYY-MM
interval_year = YYYY

[log]
mode = console file
level = info

[paths]
provisioning = /etc/grafana/provisioning

# [alerting] (legacy) was removed in Grafana 11+. Use [unified_alerting] only.

[unified_alerting]
enabled = true
execute_alerts = true
